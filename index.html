<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Todo App</title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div class="app">

    <!-- =========================
         HEADER
    ========================== -->

    <header class="header">

      <h1 class="title">
        Todo App
      </h1>

      <button
        id="themeToggle"
        aria-label="Changer le thème"
      >
        🌙
      </button>

    </header>


    <!-- =========================
         INPUT SECTION
    ========================== -->

    <section class="todo-input">

      <input
        id="taskInput"
        type="text"
        placeholder="Ajouter une tâche..."
        autocomplete="off"
        aria-label="Ajouter une tâche"
      />

      <button id="addBtn">
        Ajouter
      </button>

    </section>


    <!-- =========================
         TASK LIST
    ========================== -->

    <main>

      <ul id="taskList"></ul>

    </main>


    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="footer">

      <p id="taskCount">
        0 tâche(s)
      </p>


      <!-- FILTERS -->

      <div class="filters">

        <button data-filter="all">
          All
        </button>

        <button data-filter="active">
          Active
        </button>

        <button data-filter="done">
          Done
        </button>

      </div>


      <!-- CLEAR BUTTON -->

      <button id="clearCompleted">
        Clear completed
      </button>

    </footer>

  </div>

  <script src="script.js"></script>

</body>

</html>
